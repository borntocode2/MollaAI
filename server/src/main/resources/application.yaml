server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: molla-ai

app:
  google-web-client-id: ${GOOGLE_WEB_CLIENT_ID:}
  jwt-secret: ${APP_JWT_SECRET:}
  jwt-issuer: molla-ai
  jwt-audience: molla-ai-mobile
  jdbc-url: ${MYSQL_JDBC_URL:}
  username: ${MYSQL_USERNAME:}
  password: ${MYSQL_PASSWORD:}

openai:
  api-key: ${OPENAI_API_KEY:}
